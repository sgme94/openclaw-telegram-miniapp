<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>任务看板 - OpenClaw</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      padding: 16px;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--tg-theme-hint-color, #e0e0e0);
    }
    
    .header h1 {
      font-size: 20px;
      font-weight: 600;
    }
    
    .refresh-btn {
      background: var(--tg-theme-button-color, #3390ec);
      color: var(--tg-theme-button-text-color, #ffffff);
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    
    .stats {
      background: var(--tg-theme-secondary-bg-color, #f0f0f0);
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    
    .progress-bar {
      height: 8px;
      background: #e0e0e0;
      border-radius: 4px;
      margin: 12px 0;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: var(--tg-theme-button-color, #3390ec);
      transition: width 0.3s ease;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 12px;
    }
    
    .stat-item {
      text-align: center;
    }
    
    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--tg-theme-button-color, #3390ec);
    }
    
    .stat-label {
      font-size: 11px;
      color: var(--tg-theme-hint-color, #999999);
      margin-top: 4px;
    }
    
    .todos-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .todo-card {
      background: var(--tg-theme-secondary-bg-color, #f0f0f0);
      padding: 16px;
      border-radius: 12px;
      border-left: 4px solid var(--tg-theme-button-color, #3390ec);
    }
    
    .todo-card.pending {
      border-left-color: #FF9800;
    }
    
    .todo-card.in_progress {
      border-left-color: #2196F3;
    }
    
    .todo-card.completed {
      border-left-color: #4CAF50;
      opacity: 0.7;
    }
    
    .todo-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    
    .todo-status {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    
    .todo-status.pending {
      background: #FF9800;
      color: white;
    }
    
    .todo-status.in_progress {
      background: #2196F3;
      color: white;
    }
    
    .todo-status.completed {
      background: #4CAF50;
      color: white;
    }
    
    .todo-priority {
      font-size: 12px;
      font-weight: 500;
    }
    
    .todo-content {
      font-size: 14px;
      margin-bottom: 8px;
      line-height: 1.5;
    }
    
    .todo-info {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--tg-theme-hint-color, #999999);
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--tg-theme-hint-color, #999999);
    }
    
    .error {
      background: #ffebee;
      color: #c62828;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📋 任务看板</h1>
    <button class="refresh-btn" onclick="loadTodos()">刷新</button>
  </div>
  
  <div id="error-container"></div>
  
  <div class="stats">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <span style="font-size: 14px; font-weight: 600;">完成进度</span>
      <span id="progress-percent" style="font-size: 14px; font-weight: 700; color: var(--tg-theme-button-color);">0%</span>
    </div>
    <div class="progress-bar">
      <div id="progress-bar" class="progress-fill" style="width: 0%"></div>
    </div>
    <div class="stats-grid">
      <div class="stat-item">
        <div class="stat-value" id="total-todos">-</div>
        <div class="stat-label">总任务</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="completed-todos">-</div>
        <div class="stat-label">已完成</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="in-progress-todos">-</div>
        <div class="stat-label">进行中</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="pending-todos">-</div>
        <div class="stat-label">待处理</div>
      </div>
    </div>
  </div>
  
  <div class="todos-list" id="todos-list">
    <div class="loading">加载中...</div>
  </div>
  
  <script src="app-todos.js"></script>
</body>
</html>
