<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }
        .menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }
        .menu-item {
            display: block;
            padding: 16px;
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            text-decoration: none;
            border-radius: 12px;
            text-align: center;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        .menu-item:hover {
            opacity: 0.9;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .subtitle {
            color: var(--tg-theme-hint-color, #999999);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>🤖 OpenClaw Mini App</h1>
    <p class="subtitle">选择功能</p>
    
    <div class="menu">
        <a href="index-tasks.html" class="menu-item">
            📋 任务看板 (实时)
        </a>
        <a href="index-projects.html" class="menu-item">
            📊 项目状态
        </a>
        <a href="index-todos.html" class="menu-item">
            ✅ 待办事项
        </a>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
    </script>
</body>
</html>
