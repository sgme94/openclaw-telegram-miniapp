<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw 任务监控</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      padding: 16px;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--tg-theme-hint-color, #e0e0e0);
    }
    
    .header h1 {
      font-size: 20px;
      font-weight: 600;
    }
    
    .refresh-btn {
      background: var(--tg-theme-button-color, #3390ec);
      color: var(--tg-theme-button-text-color, #ffffff);
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .stat-card {
      background: var(--tg-theme-secondary-bg-color, #f0f0f0);
      padding: 12px;
      border-radius: 12px;
      text-align: center;
    }
    
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--tg-theme-button-color, #3390ec);
    }
    
    .stat-label {
      font-size: 12px;
      color: var(--tg-theme-hint-color, #999999);
      margin-top: 4px;
    }
    
    .sessions-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .session-card {
      background: var(--tg-theme-secondary-bg-color, #f0f0f0);
      padding: 16px;
      border-radius: 12px;
      border-left: 4px solid var(--tg-theme-button-color, #3390ec);
    }
    
    .session-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    
    .session-id {
      font-weight: 600;
      font-size: 14px;
    }
    
    .session-status {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }
    
    .status-active {
      background: #4CAF50;
      color: white;
    }
    
    .status-idle {
      background: #FF9800;
      color: white;
    }
    
    .status-completed {
      background: #9E9E9E;
      color: white;
    }
    
    .session-info {
      font-size: 13px;
      color: var(--tg-theme-hint-color, #999999);
      margin-top: 8px;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--tg-theme-hint-color, #999999);
    }
    
    .error {
      background: #ffebee;
      color: #c62828;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🦞 OpenClaw</h1>
    <button class="refresh-btn" onclick="loadSessions()">刷新</button>
  </div>
  
  <div id="error-container"></div>
  
  <div class="stats">
    <div class="stat-card">
      <div class="stat-value" id="total-sessions">-</div>
      <div class="stat-label">总会话</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="active-sessions">-</div>
      <div class="stat-label">进行中</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="tokens-used">-</div>
      <div class="stat-label">Token 使用</div>
    </div>
  </div>
  
  <div class="sessions-list" id="sessions-list">
    <div class="loading">加载中...</div>
  </div>
  
  <script src="app.js"></script>
</body>
</html>
