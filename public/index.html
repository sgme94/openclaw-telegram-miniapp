<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw 项目管理</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      padding: 16px;
    }
    .header {
      text-align: center;
      padding: 32px 16px;
      border-bottom: 1px solid var(--tg-theme-hint-color, #e0e0e0);
      margin-bottom: 24px;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .header p {
      font-size: 14px;
      color: var(--tg-theme-hint-color, #999999);
    }
    .menu {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      max-width: 600px;
      margin: 0 auto;
    }
    .menu-item {
      background: var(--tg-theme-secondary-bg-color, #f0f0f0);
      padding: 24px 16px;
      border-radius: 12px;
      text-align: center;
      text-decoration: none;
      color: var(--tg-theme-text-color, #000000);
      transition: transform 0.2s;
      cursor: pointer;
    }
    .menu-item:hover {
      transform: translateY(-2px);
    }
    .menu-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
    .menu-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .menu-desc {
      font-size: 12px;
      color: var(--tg-theme-hint-color, #999999);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🦞 OpenClaw 项目管理</h1>
    <p>事件驱动的项目状态管理系统</p>
  </div>
  
  <div class="menu">
    <a href="index-projects.html" class="menu-item">
      <div class="menu-icon">📊</div>
      <div class="menu-title">项目状态</div>
      <div class="menu-desc">查看所有项目状态和事件</div>
    </a>
    
    <a href="index-todos.html" class="menu-item">
      <div class="menu-icon">📋</div>
      <div class="menu-title">任务看板</div>
      <div class="menu-desc">Todo 任务管理</div>
    </a>
  </div>
  
  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
  </script>
</body>
</html>
